name: Run Trading Bot
on:
  schedule:
    - cron: "0 */6 * * *"
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      tickers:
        description: "Ticker da analizzare (comma separated)"
        default: "AAPL,TSLA,NVDA,BTC-USD,ETH-USD,MSFT,XOM,GLD"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Scrape news
        run: |
          python -c "
          import asyncio, os
          from scraper.news_scraper import NewsScraper

          async def main():
              scraper = NewsScraper()
              tickers_input = os.getenv('INPUT_TICKERS',
                  'AAPL,TSLA,NVDA,BTC-USD,ETH-USD,MSFT,XOM,GLD')
              tickers = [t.strip() for t in tickers_input.split(',')]

              print(f'Scraping {len(tickers)} ticker...')
              results = await scraper.run_all(tickers=tickers, days_back=2)

              total_found = sum(r['found'] for r in results.values())
              total_saved = sum(r['saved'] for r in results.values())
              for ticker, r in results.items():
                  status = 'OK' if r['found'] > 0 else 'EMPTY'
                  print(f'  {ticker}: found={r[\"found\"]}, saved={r[\"saved\"]} [{status}]')
              print(f'  TOTALE: {total_found} trovati, {total_saved} salvati')

              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f'ARTICLES_COUNT={total_saved}\n')

          asyncio.run(main())
          "
      - name: Process Sentiment
        run: |
          python -c "
          import os
          from nlp.sentiment import SentimentAnalyzer
          sa = SentimentAnalyzer()
          total = 0
          while True:
              n = sa.process_unanalyzed(limit=100)
              total += n
              if n == 0:
                  break
          print(f'Sentiment processati: {total}')
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'SENTIMENT_COUNT={total}\n')
          "
      - name: Process Embeddings
        run: |
          python -c "
          from nlp.embeddings import EmbeddingEngine
          ee = EmbeddingEngine()
          total = 0
          while True:
              n = ee.process_unembedded(limit=100)
              total += n
              if n == 0:
                  break
          print(f'Embedding generati: {total}')
          "
      - name: Run multi-agent system
        run: |
          python -c "
          import os
          from agents.orchestrator import TradingOrchestrator
          from engine.utils import safe_json_dumps

          tickers_input = os.getenv('INPUT_TICKERS',
              'AAPL,TSLA,NVDA,BTC-USD,ETH-USD,MSFT,XOM,GLD')
          tickers = [t.strip() for t in tickers_input.split(',')]

          bot = TradingOrchestrator()
          from engine.signals import SignalEngine
          from engine.scoring_engine import ScoringEngine
          sig_engine = SignalEngine()
          score_engine = ScoringEngine()

          print(f'Analisi di {len(tickers)} ticker...')
          for ticker in tickers:
              try:
                  result = bot.decide(ticker)
                  signal_dict = {
                      'ticker': ticker,
                      'signal': result['signal'],
                      'confidence': result['confidence'],
                      'reasoning': safe_json_dumps(result['reasoning']),
                  }
                  signal_id = sig_engine.save_signal(signal_dict)
                  pat_data = result.get('pattern_data', {})
                  if signal_id and pat_data.get('patterns_matched', 0) > 0:
                      score_engine.save_pattern_evaluation(
                          signal_id, ticker, pat_data,
                      )
                  print(f'{ticker}: {result[\"signal\"]} '
                        f'({result[\"confidence\"]:.0%}) '
                        f'consensus={result[\"consensus_level\"]}')
              except Exception as e:
                  print(f'{ticker}: ERRORE - {e}')
          print('Done.')
          "
      - name: Evaluate pending signals + register new
        run: |
          python -c "
          from engine.scoring_engine import ScoringEngine
          from supabase import create_client
          import os
          from datetime import datetime, timedelta

          se = ScoringEngine()

          # 1. Valuta segnali precedenti
          updated = se.evaluate_pending()
          print(f'Segnali valutati/aggiornati: {updated}')

          # 2. Registra i nuovi segnali appena generati
          supabase = create_client(
              os.getenv('SUPABASE_URL'),
              os.getenv('SUPABASE_KEY')
          )
          cutoff = (datetime.now() - timedelta(hours=1)).isoformat()
          new_signals = supabase.table('signals') \
              .select('*') \
              .gte('created_at', cutoff) \
              .execute()

          registered = 0
          for sig in (new_signals.data or []):
              se.register_signal(sig)
              registered += 1
          print(f'Nuovi segnali registrati: {registered}')

          # 3. Aggiorna performance aggregate
          se.update_agent_performance()
          print('Performance aggiornata.')

          # 4. Valuta pattern matching performance
          pat_updated = se.evaluate_pattern_performance()
          print(f'Pattern evaluations aggiornate: {pat_updated}')
          "
      - name: Notify Telegram
        run: |
          python -c "
          import os, json
          from bot_telegram.telegram_notifier import notify, format_run_message
          from supabase import create_client
          from datetime import datetime, timedelta

          supabase = create_client(
              os.getenv('SUPABASE_URL'),
              os.getenv('SUPABASE_KEY')
          )

          # Recupera ultimi segnali generati in questo run
          cutoff = (datetime.now() - timedelta(hours=1)).isoformat()
          result = supabase.table('signals') \
              .select('*') \
              .gte('created_at', cutoff) \
              .order('ticker') \
              .execute()

          signals = result.data or []

          # Recupera contatore run (numero righe signals totali / 8)
          total = supabase.table('signals').select('id', count='exact').execute()
          run_number = (total.count or 0) // 8

          # Recupera ultimo regime
          regime_data = None
          try:
              rr = supabase.table('market_regime') \
                  .select('*') \
                  .order('detected_at', desc=True) \
                  .limit(1) \
                  .execute()
              if rr.data:
                  regime_data = rr.data[0]
          except Exception as e:
              print(f'Regime fetch failed: {e}')

          msg = format_run_message(
              run_number=run_number,
              signals=signals,
              articles_count=int(os.getenv('ARTICLES_COUNT', 0)),
              sentiment_count=int(os.getenv('SENTIMENT_COUNT', 0)),
              new_signals=len(signals),
              duration_minutes=0,
              regime_data=regime_data,
          )
          notify(msg)
          print('Notifica Telegram inviata')
          "
      - name: Update correlation matrix
        run: |
          python -c "
          from engine.correlation_engine import build_correlation_matrix
          from engine.utils import safe_json_dumps
          from supabase import create_client
          import os

          result = build_correlation_matrix()
          if result:
              supabase = create_client(
                  os.getenv('SUPABASE_URL'),
                  os.getenv('SUPABASE_KEY')
              )
              supabase.table('correlation_cache').insert({
                  'matrix': safe_json_dumps(result['matrix']),
                  'high_correlations': safe_json_dumps(
                      result['high_correlations']
                  ),
                  'low_correlations': safe_json_dumps(
                      result['low_correlations']
                  ),
                  'computed_at': result['computed_at'],
              }).execute()
              print(f'Matrice correlazione aggiornata: '
                    f'{len(result[\"high_correlations\"])} '
                    f'coppie ad alta correlazione')
          else:
              print('Correlation matrix: nessun dato')
          "
      - name: Cleanup old articles
        run: |
          python -c "
          from supabase import create_client
          import os
          from datetime import datetime, timedelta

          supabase = create_client(os.getenv('SUPABASE_URL'), os.getenv('SUPABASE_KEY'))
          cutoff = (datetime.now() - timedelta(days=7)).isoformat()
          result = supabase.table('articles').delete().lt('published_at', cutoff).execute()
          deleted = len(result.data) if result.data else 0
          print(f'Articoli >7 giorni rimossi: {deleted}')
          "
      - name: Retrain ML (domenica)
        if: github.event.schedule == '0 2 * * 0'
        run: |
          python -c "
          from agents.ml_prediction_agent import MLPredictionAgent
          from engine.utils import safe_json_dumps

          agent = MLPredictionAgent()
          tickers = ['AAPL','TSLA','NVDA','BTC-USD','ETH-USD','MSFT','XOM','GLD']

          results = {}
          for ticker in tickers:
              print(f'Retraining {ticker}...')
              try:
                  agent.train(ticker)
              except Exception as e:
                  print(f'{ticker}: training failed - {e}')
                  continue

              wf = agent.walk_forward_validate(ticker)
              results[ticker] = {
                  'avg_acc': wf['avg_accuracy'],
                  'std_acc': wf['std_accuracy'],
                  'reliable': wf['is_reliable'],
              }
              print(
                  f'{ticker}: avg_acc={wf[\"avg_accuracy\"]:.3f} +/- '
                  f'{wf[\"std_accuracy\"]:.3f} | '
                  f'reliable={wf[\"is_reliable\"]}'
              )

          print()
          print('Riepilogo walk-forward:')
          print(safe_json_dumps(results, indent=2))
          "
      - name: Weekly Telegram Report
        if: github.event.schedule == '0 2 * * 0'
        run: |
          python -c "
          import os
          from supabase import create_client
          from bot_telegram.telegram_notifier import (
              notify, format_weekly_report
          )

          supabase = create_client(
              os.getenv('SUPABASE_URL'),
              os.getenv('SUPABASE_KEY')
          )

          tickers = ['AAPL','TSLA','NVDA','BTC-USD','ETH-USD','MSFT','XOM','GLD']
          ticker_stats = {}
          total_signals = 0
          best_ticker = 'N/A'
          best_hit_rate = 0

          for ticker in tickers:
              result = supabase.table('signal_evaluations') \
                  .select('score_168h, score_72h, score_24h, signal_type') \
                  .eq('ticker', ticker) \
                  .neq('signal_type', 'HOLD') \
                  .execute()

              evals = result.data or []
              scores = [
                  e['score_168h'] or e['score_72h'] or e['score_24h']
                  for e in evals
                  if (e['score_168h'] or e['score_72h'] or e['score_24h']) is not None
              ]

              if scores:
                  correct = sum(1 for s in scores if s > 0)
                  hit_rate = round(correct / len(scores) * 100, 1)
                  ticker_stats[ticker] = {'hit_rate': hit_rate, 'count': len(scores)}
                  total_signals += len(scores)
                  if hit_rate > best_hit_rate:
                      best_hit_rate = hit_rate
                      best_ticker = ticker

          # Regime stats ultimi 7 giorni
          regime_stats = []
          vix_min = None
          vix_max = None
          try:
              from datetime import datetime, timedelta
              cutoff_7d = (datetime.now() - timedelta(days=7)).isoformat()
              rr = supabase.table('market_regime') \
                  .select('regime, vix_level') \
                  .gte('detected_at', cutoff_7d) \
                  .execute()
              if rr.data:
                  from collections import Counter
                  counts = Counter(r['regime'] for r in rr.data)
                  regime_stats = [
                      {'regime': k, 'cnt': v}
                      for k, v in counts.most_common()
                  ]
                  vix_values = [
                      r['vix_level'] for r in rr.data
                      if r.get('vix_level') is not None
                  ]
                  if vix_values:
                      vix_min = min(vix_values)
                      vix_max = max(vix_values)
          except Exception as e:
              print(f'Regime stats failed: {e}')

          msg = format_weekly_report(
              ticker_stats=ticker_stats,
              total_signals=total_signals,
              best_ticker=best_ticker,
              best_hit_rate=best_hit_rate,
              regime_stats=regime_stats,
              vix_min=vix_min,
              vix_max=vix_max,
          )
          notify(msg)
          print('Report settimanale inviato su Telegram')
          "
      - name: Notify Telegram Error
        if: failure()
        run: |
          python -c "
          import os
          from bot_telegram.telegram_notifier import notify, format_error_message
          msg = format_error_message(
              error='Step fallito -- controlla i log',
              step='GitHub Actions run-bot'
          )
          notify(msg)
          "
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
      REDDIT_USER_AGENT: "trading-bot/1.0"
      INPUT_TICKERS: ${{ inputs.tickers || 'AAPL,TSLA,NVDA,BTC-USD,ETH-USD,MSFT,XOM,GLD' }}

  build-patterns:
    needs: run-bot
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       contains(github.event.schedule, '0 2 * * 0'))

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build historical patterns
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          python -c "
          from engine.pattern_extractor import PatternExtractor, TICKER_START_DATES
          pe = PatternExtractor()
          tickers = list(TICKER_START_DATES.keys())
          total = 0
          for t in tickers:
              n = pe.build_historical_patterns(t)
              print(f'{t}: {n} pattern storici salvati')
              total += n
          print(f'Pattern build completato: {total} totali')
          "
